<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDream Premium</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    color:#222;
}

header{
    background:#000;
    color:#fff;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

nav a{
    color:#fff;
    text-decoration:none;
    margin-left:20px;
}

.hero{
    height:90vh;
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1600') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero-content{
    background:rgba(0,0,0,0.6);
    padding:40px;
    border-radius:15px;
}

.hero h1{
    font-size:55px;
    margin-bottom:15px;
}

.hero p{
    font-size:22px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:14px 30px;
    background:#e63946;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.section-title{
    text-align:center;
    margin:60px 0 30px;
    font-size:38px;
}

.cars{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.car{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.car img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.car-info{
    padding:20px;
}

.car h3{
    margin-bottom:10px;
}

.price{
    color:#e63946;
    font-size:24px;
    font-weight:bold;
}

.form-section{
    width:90%;
    max-width:700px;
    margin:80px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

input,textarea{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    background:#000;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.social{
    text-align:center;
    margin:50px 0;
}

.social a{
    display:inline-block;
    margin:10px;
    padding:14px 25px;
    text-decoration:none;
    color:white;
    border-radius:8px;
}

.whatsapp{
    background:#25D366;
}

.telegram{
    background:#229ED9;
}

footer{
    background:#000;
    color:white;
    text-align:center;
    padding:25px;
}
</style>
</head>

<body>

<header>
    <div class="logo">AutoDream</div>
    <nav>
        <a href="#cars">Автомобили</a>
        <a href="#contact">Заявка</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Автомобиль твоей мечты</h1>
        <p>Премиальные автомобили по лучшим ценам</p>
        <a href="#cars" class="btn">Смотреть каталог</a>
    </div>
</section>

<h2 class="section-title" id="cars">Популярные автомобили</h2>

<section class="cars">

<div class="car">
<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?w=1200">
<div class="car-info">
<h3>BMW M5 Competition</h3>
<p class="price">75 000 $</p>
</div>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?w=1200">
<div class="car-info">
<h3>Mercedes E63 AMG</h3>
<p class="price">72 000 $</p>
</div>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1606664515524-ed2f786a0bd6?w=1200">
<div class="car-info">
<h3>Audi RS6</h3>
<p class="price">82 000 $</p>
</div>
</div>

</section>

<div class="social">
<h2>Связаться с нами</h2>

<a class="whatsapp"
href="https://wa.me/01083724582">
WhatsApp
</a>

<a class="telegram"
href="https://t.me/@bekjan012">
Telegram
</a>
</div>

<section class="form-section" id="contact">
<h2>Оставить заявку</h2>

<form>
<input type="text" placeholder="Ваше имя" required>
<input type="tel" placeholder="Телефон" required>
<textarea rows="5" placeholder="Какой автомобиль вас интересует?"></textarea>
<button type="submit">Отправить заявку</button>
</form>
</section>

<footer>
© 2025 AutoDream Premium
</footer>

</body>
</html>
